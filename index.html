!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Portifólio | Walis Barbosa</title>
</head>
<body>
    <header>
        <h1>Meu Portifólio</h1>
        <nav>
            <ul>
                <li>
                
                    <a href="#sobre">Sobre</a>
                </li>
                <li>
                    <a href="#projetos">Projetos</a>
                </li>
                <li>
                    <a href="#contato">Contato</a>
                </li>
                <li> 
                    <button id="btn-tema">🌙</button>

                </li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="sobre">
            <h2>Sobre Mim</h2>
            <p>Olá! Eu sou Walis Barbosa, estudante de Sistemas Para Internet, apaixonado por tecnologia.</p>
</section> 

        <section id="projetos">
            <h2>Meus Projetos</h2>
            <div class="projetos-container"></div>
        </section>
        <section id="contato">
            <h2>Contato</h2>
            <form action="#"method="post">
            <div class="campo"> 
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="required">
            </div>
            <div class="campo"> 
                <label for="email">Email</label>
                <input type="email" id="email" name="e-mail" required>
            </div>
            <div class="campo"> 
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" name="required"></textarea>
            </div>
            <button type="submit">Enviar</button>

            </form>
        </section>
    </main>
    <script src="script.js"></script>

    <footer>
        <p>&copy; 2026 Walis Barbosa. Todos os direitos reservados.</p> 
</body>
</html>
